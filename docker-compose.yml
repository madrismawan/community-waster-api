services:
  app:
    container_name: community-waste-app
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - inosoft

  mongodb:
    container_name: community-waste-mongodb
    image: mongo:8
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-password}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-community_waste}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --host 127.0.0.1 --username \"$$MONGO_INITDB_ROOT_USERNAME\" --password \"$$MONGO_INITDB_ROOT_PASSWORD\" --authenticationDatabase admin --eval \"quit(db.adminCommand('ping').ok ? 0 : 2)\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - inosoft

networks:
  inosoft:
    driver: bridge

volumes:
  mongodb_data:
